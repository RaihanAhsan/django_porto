<!-- portofolio/templates/portofolio/base.html -->
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Portofolio{% endblock %}</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { 
            background-color: white; 
            padding: 20px; 
            border-radius: 10px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            position: sticky; 
            top: 20px; 
        }
        .sidebar .nav-link {
            color: #333;
            border-radius: 8px;
            padding: 10px 15px;
            margin-bottom: 5px;
            transition: 0.3s;
        }
        .sidebar .nav-link:hover {
            background-color: #667eea;
            color: white;
        }
        .sidebar .nav-link.active {
            background-color: #667eea;
            color: white;
        }
        .main-content {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            min-height: 500px;
        }
        footer {
            background-color: #343a40;
            color: white;
            padding: 15px 0;
            margin-top: 40px;
            text-align: center;
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">My Portofolio</a>
        </div>
    </nav>

    <!-- Konten Utama dengan Sidebar -->
    <div class="container mt-4">
        <div class="row">
            <!-- SIDEBAR (Kiri) -->
            <div class="col-md-3">
                <div class="sidebar">
                    <h5 class="text-center mb-3"><i class="fas fa-compass"></i> Navigasi</h5>
                    <hr>
                    <div class="nav flex-column">
                        <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="{% url 'home' %}">
                            <i class="fas fa-home"></i> Beranda
                        </a>
                        <a class="nav-link {% if 'about' in request.path %}active{% endif %}" href="{% url 'about' %}">
                            <i class="fas fa-user"></i> Tentang Saya
                        </a>
                        <a class="nav-link {% if 'blog' in request.path %}active{% endif %}" href="{% url 'blog' %}">
                            <i class="fas fa-blog"></i> Blog
                        </a>
                    </div>
                    <hr>
                    <p class="text-muted small text-center mb-0">Django v6</p>
                </div>
            </div>

            <!-- KONTEN UTAMA (Kanan) -->
            <div class="col-md-9">
                <div class="main-content">
                    {% block content %}
                    <!-- Isi halaman akan diletakkan di sini -->
                    {% endblock %}
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <div class="container">
            <p class="mb-0">&copy; 2026 Dibangun dengan Django & Bootstrap</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
