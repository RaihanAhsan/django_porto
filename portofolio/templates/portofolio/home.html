<!-- portofolio/templates/portofolio/home.html -->
{% extends 'portofolio/base.html' %}

{% block title %}Beranda - Portofolio{% endblock %}

{% block content %}
<div class="text-center">
    <h1 class="display-4">Halo, Saya {{ nama }}</h1>
    <p class="lead">{{ bio }}</p>
    <hr>
    <div class="row mt-4">
        <div class="col-md-4">
            <div class="card">
                <div class="card-body">
                    <i class="fas fa-code fa-3x text-primary"></i>
                    <h5 class="mt-3">Backend</h5>
                    <p class="text-muted">Python, Django, REST API</p>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card">
                <div class="card-body">
                    <i class="fas fa-database fa-3x text-success"></i>
                    <h5 class="mt-3">Database</h5>
                    <p class="text-muted">PostgreSQL, MySQL, SQLite</p>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card">
                <div class="card-body">
                    <i class="fas fa-cloud fa-3x text-warning"></i>
                    <h5 class="mt-3">DevOps</h5>
                    <p class="text-muted">Docker, Git, Linux</p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
